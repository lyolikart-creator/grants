<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Результаты</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 5px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        .rank {
            font-weight: bold;
            color: #4CAF50;
        }
        .score {
            font-weight: bold;
            font-size: 1.1em;
        }
        a {
            color: #2196F3;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #757575;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .back-btn:hover {
            background: #616161;
        }
    </style>
</head>
<body>
    <h1>{{ scenario }} / {{ direction }}</h1>
    <table>
        <thead>
            <tr>
                <th>Место</th>
                <th>Фонд</th>
                <th>Индекс пригодности</th>
            </tr>
        </thead>
        <tbody>
            {% for item in results %}
            <tr>
                <td class="rank">{{ item.rank }}</td>
                <td><a href="/fund/{{ item.fund_id }}">{{ item.name }}</a></td>
                <td class="score">{{ item.score }}%</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="back-btn">← Назад</a>
</body>
</html>
